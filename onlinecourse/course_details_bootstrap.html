{% if user.is_authenticated %}
    <br>
    <button class="btn btn-primary btn-block w-100" data-toggle="collapse" data-target="#exam">Start Exam</button>
    
    <div id="exam" class="collapse mt-3">
        <form id="questionform" action="{% url 'onlinecourse:submit' course.id %}" method="POST">
            {% csrf_token %}
            {% for question in course.question_set.all %}
            <div class="card mt-2 mb-3 shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0">{{ question.content }} <small class="text-muted">({{ question.grade }} points)</small></h5>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        {% for choice in question.choice_set.all %}
                        <div class="form-check my-2">
                            <label class="form-check-label d-block py-1">
                                <input type="checkbox" name="choice_{{choice.id}}" class="form-check-input"
                                    id="{{choice.id}}" value="{{choice.id}}">
                                {{ choice.content }}
                            </label>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            {% endfor %}
            <input class="btn btn-success btn-block w-100 my-3" type="submit" value="Submit Exam">
        </form>
    </div>
    {% else %}
    <div class="alert alert-warning mt-3" role="alert">
        Please <a href="{% url 'onlinecourse:login' %}" class="alert-link">login</a> to take the exam.
    </div>
    {% endif %}
